name: Notificador de Pedidos — Cantinho do Caruru

on:
  schedule:
    # Roda a cada hora das 04h às 12h (horário de Brasília / UTC-3)
    # UTC equivalente: 07h-15h — cobre qualquer horário configurável pelo usuário
    - cron: "0 7-15 * * *"
  workflow_dispatch: # Permite disparar manualmente (ignora verificação de horário)

jobs:
  notificar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install gspread google-auth requests

      - name: Enviar notificação Telegram
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notificador.py
